name: Path Traversal Test
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifact with path traversal
        run: |
          mkdir -p artifact-content
          echo "TRAVERSED" > artifact-content/../../etc/traversal-test.txt
          echo "NORMAL" > artifact-content/normal.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "..%2F..%2Ftraversal-test"
          path: artifact-content/
