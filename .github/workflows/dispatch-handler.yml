name: Dispatch Handler
on:
  repository_dispatch:
    types: [test-event]
jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Process event
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Received dispatch event"
          echo "Payload: $PAYLOAD"
          echo "Token available: $(if [ -n "$GH_TOKEN" ]; then echo YES; else echo NO; fi)"
          echo "=== Check if payload can break out ==="
          echo "Raw client_payload data field: ${{ github.event.client_payload.data }}"
